<!DOCTYPE html>
<html lang="it">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ORBIT MAP WEB</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="license-screen" class="screen">
    <div class="card">
      <h1>ORBIT MAP WEB</h1>
      <p class="subtitle">Attivazione dispositivo</p>

      <label>ID DISPOSITIVO</label>
      <div id="device-id-box" class="device-box">Generazione ID...</div>

      <label>Inserisci token</label>
      <textarea id="token-input" placeholder="Incolla qui il token"></textarea>

      <button id="activate-btn">ATTIVA</button>

      <p id="license-message"></p>
    </div>
  </div>

  <div id="home-screen" class="hidden">
    <div class="home-card">
      <h1>ORBIT MAP WEB</h1>
      <p class="subtitle">Gestione progetti KML</p>

      <div id="projects-list"></div>

      <button id="new-project-btn">Nuovo progetto</button>
    </div>
  </div>

  <div id="project-screen" class="hidden">
    <div class="home-card">
      <h1>Nuovo progetto</h1>

      <label>Nome progetto</label>
      <input id="project-name-input" type="text" placeholder="Es. Albania 2026" />

      <label>Import TXT</label>
      <input id="txt-file-input" type="file" accept=".txt" />

      <div class="links-preview">
        <p><strong>KML AREE:</strong> <span id="preview-aree">Non caricato</span></p>
        <p><strong>KML FP:</strong> <span id="preview-fp">Non caricato</span></p>
        <p><strong>KML SITI:</strong> <span id="preview-siti">Non caricato</span></p>
      </div>

      <button id="save-project-btn">Salva progetto</button>
      <button id="back-home-btn" class="secondary-btn">Indietro</button>
    </div>
  </div>

<div id="map-screen" class="hidden">

    <div id="sidebar">

        <h2 id="map-title">
            ORBIT MAP WEB
        </h2>

        <button id="back-to-home-btn">
            ← Indietro
        </button>

        <hr>

        <button>
            Ricerca
        </button>

        <button id="filters-btn">
            Filtri
        </button>

        <div id="filters-panel" class="hidden">

            <label>Municipalità</label>
            <select id="municipality-filter">
                <option value="">Tutte</option>
            </select>

            <label>Prefetture</label>
            <select id="prefecture-filter">
                <option value="">Tutte</option>
            </select>

            <label>Siti</label>
            <select id="sites-filter">
                <option value="">Tutti</option>
            </select>
            <button id="clear-filters-btn">
                Disattiva filtri
            </button>

        </div>

    </div>

    <div id="map-container">

        <div id="loading-box" class="hidden">

            <div class="loading-card">

                <h3>
                    Caricamento progetto...
                </h3>

                <p id="loading-text">
                    Preparazione...
                </p>

                <div class="loading-bar">

                    <div id="loading-progress"></div>

                </div>

            </div>

        </div>

        <div id="map"></div>

    </div>

</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="license.js"></script>
  <script src="app.js?ts=orbitmap4"></script>

</body>
